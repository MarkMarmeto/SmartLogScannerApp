# SDLC Studio Configuration
# Generated by /sdlc-studio init on 2026-02-13

project:
  name: SmartLog Scanner
  type: desktop_application
  language: csharp
  language_version: "12"
  framework: maui
  runtime: net8.0
  targets:
    - net8.0-maccatalyst
    - net8.0-windows10.0.19041.0
  description: >
    Offline-capable cross-platform .NET MAUI desktop application for school gates.
    QR-based student attendance tracking via camera or USB barcode scanner.
    Runs on Windows and macOS. Communicates with SmartLog Admin Web App via REST API
    over school LAN. Queues scans locally via SQLite when offline.

testing:
  default_approach: tdd
  unit_framework: xunit
  integration_framework: xunit
  mocking_framework: moq
  coverage_targets:
    unit: 90
    integration: 85
    e2e_features: 100

documentation:
  style: american
  include_diagrams: true
  diagram_tool: mermaid

quality:
  linter: dotnet-analyzers
  formatter: dotnet-format
  type_checker: nullable-reference-types

paths:
  sdlc_root: sdlc-studio
  tests: SmartLog.Scanner.Tests
  source: SmartLog.Scanner
