name: CI — Build & Test

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

jobs:
  build-and-test:
    name: Build & Test
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 8
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Install MAUI workload
        run: dotnet workload install maui-windows

      - name: Restore Core Library
        run: dotnet restore SmartLog.Scanner.Core

      - name: Restore Scanner App (Windows only)
        run: dotnet restore SmartLog.Scanner -p:TargetFrameworks=net8.0-windows10.0.19041.0

      - name: Restore Tests
        run: dotnet restore SmartLog.Scanner.Tests

      - name: Build Core Library
        run: dotnet build SmartLog.Scanner.Core -c Release --no-restore

      - name: Build Scanner App (Windows)
        run: dotnet build SmartLog.Scanner -f net8.0-windows10.0.19041.0 -c Release --no-restore

      - name: Build Tests
        run: dotnet build SmartLog.Scanner.Tests -c Release --no-restore

      - name: Run tests
        run: dotnet test SmartLog.Scanner.Tests --no-build -c Release --logger "trx;LogFileName=test-results.trx" --results-directory ./test-results

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: ./test-results/*.trx
          retention-days: 14
